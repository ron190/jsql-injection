FIELD_QUERYSTRING_TOOLTIP=\
<html><b>Website URL</b><br>\
jSQL <u>siempre</u> injecta el \u00fartimo par\u00e1metro, en cualqui\u00e9 modo: default/GET, Request or Header.<br>\
Dejah\u2019 el \u00faltimo par\u00e1metro vac\u00edo p\u00e1 que jSQL busque er solo er mej\u00f3 valoh\u2019 :<br>\
<i>E.g. <<b>http://127.0.0.1/path?paramN=valueN&injectMe=\</i><br>\
O fuer\u00e7a el \u00fartimo par\u00e1metro para que use tuh propioh valoreh (usa el id actu\u00e1 o una cadena como 0' or -1) :<br>\
<i>E.g. <b>http://127.0.0.1/path?paramN=valueN&injectMe=0'\</i><hr>\
<b>punto de Inyecci\u00f3n</b><br>\
Usar el car\u00e1cteh\u2019 * para injectah\u2019 dentro de la URL o los par\u00e1metroh<br>\
<i>E.g. <b>http://127.0.0.1/path?injectMe=-1*&paramN=valueN\</i><hr>\
<b>NTLM and Negotiate Authentication</b> (NTLM tambi\u00e9n puede seh\u2019 definido en las Preferencias)<br>\
Definir NTLM y negociah\u2019 autentica\u00e7i\u00f3 de uzuario en la URL.<br>\
<i>E.g. <b>http://domain\\\\user:pass@127.0.0.1/path?injectMe=\</i>\
</html>

